<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Contrato</title>
    <style>
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; }
        input, select, textarea { width: 300px; padding: 8px; }
        .alert-error { background-color: #f8d7da; color: #721c24; padding: 10px; border: 1px solid #f5c6cb; border-radius: 4px; margin-bottom: 15px; width: fit-content; }
        .error-text { color: #dc3545; font-size: 0.85em; margin-top: 4px; display: block; font-weight: bold; }
    </style>
</head>
<body>
<h1 th:text="${contrato.id == null ? 'Nuevo Contrato' : 'Editar Contrato'}">Contrato</h1>

<div th:if="${errorGlobal}" class="alert-error">
    <strong th:text="${errorGlobal}"></strong>
</div>

<form th:action="@{/contratos/guardar}" th:object="${contrato}" method="post">
    <input type="hidden" th:field="*{id}" />

    <div class="form-group">
        <label>Propiedad:</label>
        <select th:field="*{propiedad}" required>
            <option value="0">Seleccione...</option>
            <option th:each="p : ${propiedades}" th:value="${p.id}" th:text="${p.direccion + ' - ' + p.ciudad + ' (' + p.tipo + ')'}"></option>
        </select>
        <span class="error-text" th:if="${#fields.hasErrors('propiedad')}" th:errors="*{propiedad}"></span>
    </div>

    <div class="form-group">
        <label>Propietario:</label>
        <select th:field="*{propietario}" required>
            <option value="0">Seleccione...</option>
            <option th:each="prop : ${inquilinos}" th:value="${prop.id}" th:text="${prop.nombreCompleto}"></option>
        </select>
        <span class="error-text" th:if="${#fields.hasErrors('propietario')}" th:errors="*{propietario}"></span>
    </div>

    <div class="form-group">
        <label>Inquilino:</label>
        <select th:field="*{inquilino}" required>
            <option value="0">Seleccione...</option>
            <option th:each="i : ${inquilinos}" th:value="${i.id}" th:text="${i.nombreCompleto}"></option>
        </select>
        <span class="error-text" th:if="${#fields.hasErrors('inquilino')}" th:errors="*{inquilino}"></span>
    </div>

    <div class="form-group">
        <label>Fecha Inicio:</label>
        <input type="date" th:field="*{fechaInicio}" required />
        <span class="error-text" th:if="${#fields.hasErrors('fechaInicio')}" th:errors="*{fechaInicio}"></span>
    </div>

    <div class="form-group">
        <label>Duración (meses):</label>
        <input type="number" th:field="*{duracionMeses}" required />
        <span class="error-text" th:if="${#fields.hasErrors('duracionMeses')}" th:errors="*{duracionMeses}"></span>
    </div>

    <div class="form-group">
        <label>Importe Mensual:</label>
        <input type="number" step="0.01" th:field="*{importeMensual}" required />
        <span class="error-text" th:if="${#fields.hasErrors('importeMensual')}" th:errors="*{importeMensual}"></span>
    </div>

    <div class="form-group">
        <label>Dia de vencimiento mensual (1 a 31):</label>
        <input type="number" step="1" th:field="*{diaVencimientoMensual}" required />
        <span class="error-text" th:if="${#fields.hasErrors('diaVencimientoMensual')}" th:errors="*{diaVencimientoMensual}"></span>
    </div>

    <div class="form-group">
        <label>Descripción:</label>
        <textarea th:field="*{descripcion}"></textarea>
        <span class="error-text" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></span>
    </div>

    <div class="form-group">
        <label>Estado:</label>
        <select th:field="*{estado}" required>
            <option value="">Seleccione...</option>
            <option th:each="e : ${estados}" th:value="${e}" th:text="${e}"></option>
        </select>
        <span class="error-text" th:if="${#fields.hasErrors('estado')}" th:errors="*{estado}"></span>
    </div>

    <button type="submit">Guardar</button>
</form>
</body>
</html>
