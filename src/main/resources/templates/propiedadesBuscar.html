<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{propiedad.buscar.titulo}"></title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
    <main class="contenedor">
        <section class="bienvenida">
            <h1><span th:text="#{empresa}"></span></h1>
            <p th:text="#{propiedad.buscar.titulo}"></p>
        </section>

        <p th:if="${error}" th:text="${error}" class="error"></p>

        <form th:action="@{/propiedadesBuscar}" th:object="${formBean}" method="post">
            <table border="0">
                <tr>
                    <td><label th:text="#{propiedad.direccion}"></label></td>
                    <td><input type="text" th:field="*{direccion}" /></td>
                </tr>
                <tr>
                    <td><label th:text="#{propiedad.ciudad}"></label></td>
                    <td>
                        <select th:field="*{ciudadSeleccionada}">
                            <option value="">Todas</option>
                            <option th:each="c : ${allCiudades}" th:value="${c.id}" th:text="${c.nombre}"></option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td><label th:text="#{propiedad.tipo}"></label></td>
                    <td>
                        <select th:field="*{tipo}">
                            <option value="">Todos</option>
                            <option th:each="t : ${allTipos}" th:value="${t}" th:text="${t}"></option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td><label th:text="#{propiedad.estadoDisponibilidad}"></label></td>
                    <td>
                        <select th:field="*{estadoDisponibilidad}">
                            <option value="">Todos</option>
                            <option th:each="e : ${allEstados}" th:value="${e}" th:text="${e}"></option>
                        </select>
                    </td>
                </tr>
            </table>

            <table class="botones">
                <tr>
                    <td><input type="submit" name="action" value="Buscar" /></td>
                    <td><input type="submit" name="action" value="Limpiar" /></td>
                    <td><input type="submit" name="action" value="Registrar" /></td>
                    <td><input type="submit" name="action" value="Volver" /></td>
                </tr>
            </table>

            <table class="resultados" border="0">
                <thead>
                    <tr>
                        <th><label th:text="#{propiedad.id}"></label></th>
                        <th><label th:text="#{propiedad.direccion}"></label></th>
                        <th><label th:text="#{propiedad.ciudad}"></label></th>
                        <th><label th:text="#{propiedad.tipo}"></label></th>
                        <th><label th:text="#{propiedad.cantidadAmbientes}"></label></th>
                        <th><label th:text="#{propiedad.metrosCuadrados}"></label></th>
                        <th><label th:text="#{propiedad.estadoDisponibilidad}"></label></th>
                        <th><label th:text="#{propiedad.propietario}"></label></th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${resultados}">
                        <td th:text="${p.id}"></td>
                        <td th:text="${p.direccion}"></td>
                        <td th:text="${p.ciudad == null ? '' : p.ciudad.nombre}"></td>
                        <td th:text="${p.tipo}"></td>
                        <td th:text="${p.cantidadAmbientes}"></td>
                        <td th:text="${p.metrosCuadrados}"></td>
                        <td th:text="${p.estadoDisponibilidad}"></td>
                        <td th:text="${p.propietario == null ? '' : p.propietario.nombreCompleto}"></td>
                        <td>
                            <a th:href="@{/propiedadEditar/{id}(id=${p.id})}" th:text="#{links.editar}"></a>
                            <br/>
                            <button type="submit"
                                    th:formaction="@{/propiedadEditar/delete/{id}(id=${p.id})}"
                                    formmethod="post"
                                    onclick="return confirm('Esta seguro que desea eliminar esta propiedad?');"
                                    th:text="#{links.eliminar}">
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </form>
    </main>
</body>
</html>
