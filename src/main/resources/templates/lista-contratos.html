<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gestión de Contratos</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<main class="contenedor">
    <section class="bienvenida">
        <h1>Gestión de Contratos</h1>
        <p>Contratos Vigentes</p>
    </section>

    <p th:if="${errorGlobal}" th:text="${errorGlobal}" class="error"></p>

    <form th:action="@{/contratos}" method="get">
        <table border="0">
            <tr>
                <td><label>Propiedad:</label></td>
                <td>
                    <select name="propiedad">
                        <option value="">Todas las propiedades</option>
                        <option th:each="p : ${propiedades}"
                                th:value="${p.id}"
                                th:text="${p.direccion + ' - ' + p.ciudad + ' (' + p.tipo + ')'}"
                                th:selected="${p.id == propiedadSelect}"></option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><label>Inquilino:</label></td>
                <td>
                    <select name="inquilino">
                        <option value="">Todos los inquilinos</option>
                        <option th:each="i : ${inquilinos}"
                                th:value="${i.id}"
                                th:text="${i.nombreCompleto}"
                                th:selected="${i.id == inquilinoSelect}"></option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><label>Estado:</label></td>
                <td>
                    <select name="estadoContrato">
                        <option value="">Todos los estados</option>
                        <option th:each="e : ${estados}"
                                th:value="${e}"
                                th:text="${e}"
                                th:selected="${e == estadoSelec}"></option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><label>Fechas:</label></td>
                <td>
                    <input type="date" name="fechaDesde" th:value="${fechaDesdeSelec}" />
                    <input type="date" name="fechaHasta" th:value="${fechaHastaSelec}" />
                </td>
            </tr>
        </table>

        <table class="botones">
            <tr>
                <td><input type="submit" value="Filtrar" /></td>
                <td><input type="submit" value="Limpiar" th:formaction="@{/contratos}" formmethod="get" /></td>
                <td><input type="submit" value="Nuevo Contrato" th:formaction="@{/contratos/nuevo}" formmethod="get" /></td>
                <td><input type="submit" value="Volver" th:formaction="@{/}" formmethod="get" /></td>
            </tr>
        </table>

        <table class="resultados" border="0">
            <thead>
            <tr>
                <th><label>ID</label></th>
                <th><label>Propiedad</label></th>
                <th><label>Inquilino</label></th>
                <th><label>Inicio</label></th>
                <th><label>Duración (meses)</label></th>
                <th><label>Importe</label></th>
                <th><label>Vencimiento</label></th>
                <th><label>Estado</label></th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${contratos}">
                <td th:text="${c.id}"></td>
                <td th:text="${c.propiedad.direccion + ' - ' + c.propiedad.ciudad + ' (' + c.propiedad.tipo + ')'}"></td>
                <td th:text="${c.inquilino.nombreCompleto}"></td>
                <td th:text="${#temporals.format(c.fechaInicio, 'dd/MM/yyyy')}"></td>
                <td th:text="${c.duracionMeses}"></td>
                <td th:text="${#numbers.formatCurrency(c.importeMensual)}"></td>
                <td th:text="${c.diaVencimientoMensual}"></td>
                <td th:text="${c.estado}"></td>
                <td>
                    <a th:href="@{/contratos/actualizar/{id}(id=${c.id})}">Editar</a>
                    <br/>
                    <button type="submit"
                            th:formaction="@{/contratos/eliminar/{id}(id=${c.id})}"
                            formmethod="get"
                            onclick="return confirm('¿Eliminar contrato?');">
                        Eliminar
                    </button>
                </td>
            </tr>
            </tbody>
        </table>
    </form>
</main>
</body>
</html>
