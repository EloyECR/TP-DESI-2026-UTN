<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{propiedad.editar.titulo}"></title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
    <main class="contenedor">
        <section class="bienvenida">
            <h1><span th:text="#{empresa}"></span></h1>
            <p th:text="${formBean.id} ? #{propiedad.editar.titulo} : #{propiedad.registrar.titulo}"></p>
        </section>

        <form th:action="@{/propiedadEditar}" th:object="${formBean}" method="post">
            <p th:each="err : ${#fields.errors('global')}" th:text="${err}" class="error"></p>
            <input type="hidden" th:field="*{id}">

            <table border="0">
                <tr>
                    <td><label th:text="#{propiedad.id}"></label></td>
                    <td><input type="text" th:value="*{id}" readonly /></td>
                    <td></td>
                </tr>
                <tr>
                    <td><label th:text="#{propiedad.direccion}"></label></td>
                    <td><input type="text" th:field="*{direccion}" /></td>
                    <td><p th:if="${#fields.hasErrors('direccion')}" th:errorclass="error" th:errors="*{direccion}"></p></td>
                </tr>
                <tr>
                    <td><label th:text="#{propiedad.ciudad}"></label></td>
                    <td>
                        <select th:field="*{idCiudad}">
                            <option value=""></option>
                            <option th:each="c : ${allCiudades}" th:value="${c.id}" th:text="${c.nombre}"></option>
                        </select>
                    </td>
                    <td><p th:if="${#fields.hasErrors('idCiudad')}" th:errorclass="error" th:errors="*{idCiudad}"></p></td>
                </tr>
                <tr>
                    <td><label th:text="#{propiedad.tipo}"></label></td>
                    <td>
                        <select th:field="*{tipo}">
                            <option value=""></option>
                            <option th:each="t : ${allTipos}" th:value="${t}" th:text="${t}"></option>
                        </select>
                    </td>
                    <td><p th:if="${#fields.hasErrors('tipo')}" th:errorclass="error" th:errors="*{tipo}"></p></td>
                </tr>
                <tr>
                    <td><label th:text="#{propiedad.cantidadAmbientes}"></label></td>
                    <td><input type="number" th:field="*{cantidadAmbientes}" min="1" /></td>
                    <td><p th:if="${#fields.hasErrors('cantidadAmbientes')}" th:errorclass="error" th:errors="*{cantidadAmbientes}"></p></td>
                </tr>
                <tr>
                    <td><label th:text="#{propiedad.metrosCuadrados}"></label></td>
                    <td><input type="number" th:field="*{metrosCuadrados}" min="0.01" step="0.01" /></td>
                    <td><p th:if="${#fields.hasErrors('metrosCuadrados')}" th:errorclass="error" th:errors="*{metrosCuadrados}"></p></td>
                </tr>
                <tr>
                    <td><label th:text="#{propiedad.descripcion}"></label></td>
                    <td><textarea th:field="*{descripcion}" rows="3"></textarea></td>
                    <td><p th:if="${#fields.hasErrors('descripcion')}" th:errorclass="error" th:errors="*{descripcion}"></p></td>
                </tr>
                <tr>
                    <td><label th:text="#{propiedad.comodidades}"></label></td>
                    <td><textarea th:field="*{comodidades}" rows="3"></textarea></td>
                    <td><p th:if="${#fields.hasErrors('comodidades')}" th:errorclass="error" th:errors="*{comodidades}"></p></td>
                </tr>
                <tr>
                    <td><label th:text="#{propiedad.estadoDisponibilidad}"></label></td>
                    <td>
                        <select th:field="*{estadoDisponibilidad}">
                            <option value=""></option>
                            <option th:each="e : ${allEstados}" th:value="${e}" th:text="${e}"></option>
                        </select>
                    </td>
                    <td><p th:if="${#fields.hasErrors('estadoDisponibilidad')}" th:errorclass="error" th:errors="*{estadoDisponibilidad}"></p></td>
                </tr>
                <tr>
                    <td><label th:text="#{propiedad.propietario}"></label></td>
                    <td>
                        <select th:field="*{idPropietario}">
                            <option value=""></option>
                            <option th:each="p : ${allPropietarios}" th:value="${p.id}" th:text="${p.nombreCompleto}"></option>
                        </select>
                    </td>
                    <td><p th:if="${#fields.hasErrors('idPropietario')}" th:errorclass="error" th:errors="*{idPropietario}"></p></td>
                </tr>
            </table>

            <table class="botones">
                <tr>
                    <td><input type="submit" name="action" value="Aceptar" /></td>
                    <td><input type="submit" name="action" value="Volver" /></td>
                </tr>
            </table>
        </form>
    </main>
</body>
</html>
